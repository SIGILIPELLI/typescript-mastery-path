      - "04 · Functions & Type Annotations": level-1/04-functions-type-annotations.md
      - "05 · Interfaces & Type Aliases": level-1/05-interfaces-type-aliases.md
      - "06 · Arrays & Objects, Typed": level-1/06-arrays-objects-typed.md
      - "07 · Classes Basics": level-1/07-classes-basics.md
      - "08 · Enums": level-1/08-enums.md
      - "09 · Modules & tsconfig Deep Dive": level-1/09-modules-tsconfig.md
      - "10 · Project — Typed CLI To-Do App": level-1/10-project-todo-cli.md
  - "Level 2 · Intermediate":
